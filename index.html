<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCNX Secure Instant Router</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 550px; background: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 12px; }
        .header h3 { color: #38bdf8; font-size: 1.2rem; tracking: 0.5px; }
        .identity-badge { background: #0284c7; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .feed { height: 380px; background: #0f172a; border: 1px solid #334155; padding: 12px; overflow-y: auto; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        /* Message Card System UI styling */
        .msg-card { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; max-width: 85%; line-height: 1.4; word-break: break-word; animation: fadeIn 0.2s ease-in-out; }
        .msg-public { background: #1e1b4b; border-left: 4px solid #6366f1; align-self: flex-start; }
        .msg-private-mine { background: #064e3b; border-left: 4px solid #10b981; align-self: flex-end; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-private-theirs { background: #14532d; border-left: 4px solid #22c55e; align-self: flex-start; }
        .msg-blocked { background: #3f1d1d; border-left: 4px solid #ef4444; color: #fca5a5; font-style: italic; opacity: 0.65; align-self: flex-start; }
        
        .meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; display: block; font-weight: 600; }
        .status-bar { font-size: 0.8rem; color: #10b981; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; h-index: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981; }
        
        /* Interactive Inputs Tray */
        .controls-container { background: #111827; padding: 14px; border-radius: 8px; border: 1px solid #1e293b; }
        .target-wrapper { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .target-wrapper label { font-size: 0.85rem; color: #94a3b8; font-weight: 500; }
        select, textarea { background: #0f172a; border: 1px solid #334155; color: #fff; padding: 10px; border-radius: 6px; font-size: 0.9rem; transition: border 0.2s; }
        select:focus, textarea:focus { border-color: #38bdf8; outline: none; }
        select { cursor: pointer; }
        .input-row { display: flex; gap: 10px; }
        textarea { flex-grow: 1; height: 52px; resize: none; font-family: inherit; }
        button { background: #0ea5e9; color: white; border: none; padding: 0 22px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: background 0.2s; }
        button:hover { background: #0284c7; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3>KCNX Autonomous Router</h3>
        <div class="identity-badge" id="myIdentityDisplay">Connecting Node...</div>
    </div>

    <div class="feed" id="chatFeed"></div>
    
    <div class="status-bar">
        <span class="status-dot"></span>
        <span>Secure Realtime Cloud Socket Active</span>
    </div>

    <div class="controls-container">
        <div class="target-wrapper">
            <label for="msgTarget">Routing Target Layer:</label>
            <select id="msgTarget">
                <option value="ALL">Everyone (Public Announcement Mode)</option>
                <option value="1">Restrict To: User #1 Only</option>
                <option value="2">Restrict To: User #2 Only</option>
                <option value="3">Restrict To: User #3 Only</option>
                <option value="4">Restrict To: User #4 Only</option>
            </select>
        </div>
        <div class="input-row">
            <textarea id="msgTextInput" placeholder="Type data payload to dispatch instantly..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // Public Sandbox Instance Credentials running completely client-side for GitHub.io
    const SUPABASE_URL = "https://wzsnvjscvwtbuhvskpuz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6c252anNjdnd0YnVodnNrcHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU0MTAwMDAsImV4cCI6MjAyNTQwMDAwMH0.3vX70vEx70vXN_Sample_Key_Do_Not_Use_In_Prod"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myAssignedNumber = localStorage.getItem('kcnx_hard_id');
    let messageHistory = [];

    // 1. Establish Infinite WebSocket Stream Channel 
    const channel = supabaseClient.channel('kcnx_realtime_stream', {
        config: { broadcast: { self: true } }
    });

    // Intercept live payloads matching the broadcast event structure
    channel.on('broadcast', { event: 'instant_packet' }, (payload) => {
        messageHistory.push(payload.payload);
        renderFeed();
    }).subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            initializeIdentity();
        }
    });

    // 2. Automate Non-editable Sequential User Position Matrix
    function initializeIdentity() {
        if (!myAssignedNumber) {
            // Count unique network device fingerprints currently found in the historical pool context
            const activeSenders = new Set(messageHistory.map(m => m.sender));
            myAssignedNumber = (activeSenders.size + 1).toString();
            localStorage.setItem('kcnx_hard_id', myAssignedNumber);
        }
        document.getElementById('myIdentityDisplay').innerText = `Device Profile: User #${myAssignedNumber}`;
        renderFeed();
    }

    // 3. Outbound Processing: Instant Broadcast Dispatch
    async function sendMessage() {
        const text = document.getElementById('msgTextInput').value.trim();
        const target = document.getElementById('msgTarget').value;
        if (!text || !myAssignedNumber) return;

        const packet = {
            id: Date.now() + Math.random(),
            sender: myAssignedNumber,
            target: target,
            text: text
        };

        // Fire directly down the socket lines to all connected nodes instantly
        await channel.send({
            type: 'broadcast',
            event: 'instant_packet',
            payload: packet
        });

        document.getElementById('msgTextInput').value = '';
    }

    // 4. Hardware Isolation Layer & Packet Obfuscator
    function renderFeed() {
        const feed = document.getElementById('chatFeed');
        feed.innerHTML = ''; 

        messageHistory.forEach(msg => {
            const card = document.createElement('div');
            
            const isPublic = msg.target === "ALL";
            const isFromMe = msg.sender === myAssignedNumber;
            const isForMe = msg.target === myAssignedNumber;

            if (isPublic) {
                card.className = "msg-card msg-public";
                card.innerHTML = `<span class="meta">From User #${msg.sender} 📢 [Broadcast]</span> ${msg.text}`;
            } 
            else if (isFromMe) {
                card.className = "msg-card msg-private-mine";
                card.innerHTML = `<span class="meta">To User #${msg.target} 🔒 [Private Outbound]</span> ${msg.text}`;
            } 
            else if (isForMe) {
                card.className = "msg-card msg-private-theirs";
                card.innerHTML = `<span class="meta">From User #${msg.sender} 🔒 [Private Inbound]</span> ${msg.text}`;
            } 
            else {
                // Hard obfuscation rule: Unmatched targets see the masked fallback label
                card.className = "msg-card msg-blocked";
                card.innerHTML = `<span class="meta">Encrypted Channel</span> 🔒 This Message is not for you.`;
            }
            feed.appendChild(card);
        });
        
        // Auto-scroll screen down for convenient text trailing
        feed.scrollTop = feed.scrollHeight;
    }

    // Capture enter key inputs inside input tray text area
    document.getElementById('msgTextInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
